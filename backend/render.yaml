# Render Blueprint — deploy ScreenSense backend + MongoDB in one click.
# https://render.com/docs/blueprint-spec
#
# Usage:
#   1. Push this repo to GitHub.
#   2. https://dashboard.render.com/select-repo?type=blueprint
#   3. Pick this repo → it auto-reads /app/backend/render.yaml
#   4. After the first deploy, open the web service → Environment →
#      add EMERGENT_LLM_KEY (from your Emergent profile) and (after §3 of
#      STEP_BY_STEP_GUIDE) upload google-service-account.json as a Secret File
#      with mountPath /etc/secrets/google-service-account.json, then change
#      backend/billing.py to read from /etc/secrets/google-service-account.json.

services:
  - type: web
    name: screensense-api
    plan: starter            # $7/mo or use 'free' for the always-spinning-down free tier
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/
    autoDeploy: true
    envVars:
      - key: MONGO_URL
        fromDatabase:
          name: screensense-mongo
          property: connectionString
      - key: EMERGENT_LLM_KEY
        sync: false           # "sync: false" forces you to set it in the dashboard
      - key: PORT
        value: 10000
    domains:
      - api.screensense.app   # delete this line if you don't have a custom domain yet

databases:
  - name: screensense-mongo
    plan: starter             # $7/mo Mongo (or use 'free' tier 256 MB)
    databaseName: screensense
