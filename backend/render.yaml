# Render Blueprint — ScreenSense backend (FastAPI on Docker).
#
# We use MongoDB Atlas (free tier) for the database, since Render no longer
# offers managed Mongo. The MONGO_URL secret is set in the dashboard.
#
# Deploy:
#   1. Push this repo to GitHub.
#   2. https://dashboard.render.com/blueprints/new → pick this repo.
#   3. Render auto-reads /backend/render.yaml.
#   4. Set the four env vars when prompted (already populated below as 'sync: false').

services:
  - type: web
    name: screensense-api
    plan: free                        # free tier — sleeps after 15 min idle
    runtime: docker
    region: oregon
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/
    autoDeploy: true
    envVars:
      - key: MONGO_URL
        sync: false                   # set in dashboard → Atlas connection string
      - key: DB_NAME
        value: screensense
      - key: EMERGENT_LLM_KEY
        sync: false                   # set in dashboard
      - key: PORT
        value: "10000"
