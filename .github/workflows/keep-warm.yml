# Pings the Render backend every 10 minutes so the free tier never sleeps.
# This eliminates the 30-60s cold-start the user experienced on first launch.
name: Keep ScreenSense backend warm

on:
  schedule:
    - cron: '*/5 * * * *'    # every 5 minutes — Render free tier sleeps after 15 min idle
  workflow_dispatch:          # also run on demand via the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Wake backend
        run: |
          curl -fsSL --max-time 60 \
            -o /dev/null -w "%{http_code} %{time_total}s\n" \
            https://screensense-api.onrender.com/api/ || true
