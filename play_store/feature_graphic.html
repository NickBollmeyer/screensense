<!doctype html>
<html><head><meta charset="utf-8"><title>feature graphic</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1024px;height:500px;overflow:hidden;background:#050507}
  body{font-family:Inter,-apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased; color:#fff;}
  .wrap{
    width:1024px; height:500px; position:relative; overflow:hidden;
    display:flex; align-items:center;
    background:
      radial-gradient(circle at 15% 30%, rgba(0,122,255,0.30), transparent 50%),
      radial-gradient(circle at 85% 70%, rgba(255,59,48,0.18), transparent 50%),
      linear-gradient(135deg, #0A1430 0%, #050507 100%);
  }
  .left{
    flex:1.3; padding:0 56px;
  }
  .eyebrow{
    color:#66B2FF; font-size:13px; font-weight:800; letter-spacing:4px;
    text-transform:uppercase; margin-bottom:16px;
  }
  h1{
    font-size:62px; line-height:1.04; font-weight:800; letter-spacing:-2px;
  }
  h1 .a{ color:#3B82F6; }
  .sub{
    color:#A0A0A8; font-size:18px; line-height:1.5; margin-top:18px; max-width:480px;
  }
  .badge{
    display:inline-flex; align-items:center; gap:8px;
    margin-top:24px; padding:10px 18px;
    background:rgba(52,199,89,0.15); border:1px solid rgba(52,199,89,0.4);
    border-radius:999px; font-size:13px; font-weight:700; color:#34C759;
  }
  .badge .dot{ width:7px; height:7px; border-radius:50%; background:#34C759; }
  .right{
    flex:1; display:flex; align-items:center; justify-content:center;
    position:relative;
  }
  .ring{
    width:340px; height:340px; border-radius:50%;
    background: conic-gradient(#FF3B30 0deg 252deg, rgba(255,255,255,0.10) 252deg 360deg);
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 100px rgba(255,59,48,0.2);
    position:relative;
  }
  .ring::after{
    content:''; position:absolute; inset:14px;
    border-radius:50%; background:#0A0A0A;
    box-shadow: inset 0 4px 30px rgba(0,0,0,0.6);
  }
  .ring-inner{
    position:relative; z-index:2; text-align:center;
  }
  .ring-inner .h{ font-size:64px; font-weight:800; letter-spacing:-3px; }
  .ring-inner .l{ font-size:11px; letter-spacing:3px; color:#A0A0A8; font-weight:700; margin-top:4px; }
  .pill-row{
    position:absolute; bottom:50px; left:50%; transform:translateX(-50%);
    display:flex; gap:10px;
  }
  .pill{
    background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.10);
    border-radius:14px; padding:10px 14px;
    font-size:11px; color:#A0A0A8; font-weight:600;
  }
  .pill b{ color:#fff; font-size:14px; font-weight:800; display:block; letter-spacing:-0.5px; }
  .brand{ position:absolute; top:34px; right:42px; font-size:13px; letter-spacing:5px; font-weight:800; color:#fff; }
  .brand-mark{
    display:inline-flex; align-items:center; justify-content:center;
    width:30px; height:30px; border-radius:8px;
    background:rgba(0,122,255,0.18); border:1px solid rgba(0,122,255,0.45);
    margin-right:10px; vertical-align:middle;
  }
</style></head>
<body>
  <div class="wrap">
    <div class="brand">
      <span class="brand-mark">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      </span>SCREENSENSE
    </div>
    <div class="left">
      <div class="eyebrow">AI screen-time coach · Android</div>
      <h1>Get your<br><span class="a">hours back.</span></h1>
      <div class="sub">An AI coach that turns your phone usage into clear, daily wins. Save 90 minutes a day in your first month.</div>
      <div class="badge"><span class="dot"></span>7-day free trial · No card</div>
    </div>
    <div class="right">
      <div class="ring">
        <div class="ring-inner">
          <div class="h">9h 4m</div>
          <div class="l">SCREEN TIME</div>
        </div>
      </div>
    </div>
  </div>
</body></html>
